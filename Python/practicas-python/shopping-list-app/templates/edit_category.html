{% extends 'layout.html' %}

{% block body %}
<div class="row">
    <div class="col-md-4 offset-md-4 my-auto">
        <form action="/edit_category/{{ category.id }} " method="POST" class="card bg-dark text-light rounded-3">
            <div class="card-body p-4">
                
                <div class="mb-3">
                    <label for="fullname">Write the category:</label>
                    <input type="text" name="nameCategory" placeholder="Name category" value="{{ category.name }}"  class="form-control rounded-3 bg-dark border-1 border-light text-white">
                </div>
                
                <button type="submit" class="btn btn-primary">Save</button>
                
            </div>
        </form>
    </div>
</div>
{% endblock %}
