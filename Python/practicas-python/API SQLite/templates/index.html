<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks App</title>
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>
<body>
  <main class=" container p-4 ">
    
    <h1 class=" display-6 text-center title mt4 ">Tasks App</h1>

    <div class="row">
      <div class="col-md-4 offset-md-4 my-auto">
        <div class="card">
          <div class="card-header">
            <form action="/create-task" method="POST">
              <div class=" p-1 ">
                <input type="text" placeholder="Task" class="form-control" name="content" autofocus>
              </div>
              <button type="submit" name="content" class=" btn btn-primary "> save </button>
            </form>
          </div>
          <div class="card-body">
            <ul class=" list-group ">
              {% for task in tasks %}
              <li class=" list-group-item ">
                <span class="{% if task.done %} done {% endif %}"> {{ task.content }} <br></span>
                <a href=" /done/{{ task.id }}" class="btn btn-warning btn-sm float-right mx-1 ">done</a>
                <a href=" /delete/{{ task.id }}" class="btn btn-danger btn-sm float-right mx-1 ">Delete</a>
              </li>
              {% endfor %}
            </ul>
          </div>
        </div>
      </div>
    </div>

  </main>
</body>
</html>
