{% extends 'layout.html' %}

{% block body %}


<div class="row">

    <div class="col-md-5">
        {% include('partials/_message.html') %}

        {% include('partials/_contactform.html') %}
    </div>

    <div class="col-md-7">
        {% for contact in contacts %}

        <div class="card mb-1 text-white bg-dark rounded-3">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <h5> {{ contact.fullname }} </h5>
                    <div>
                        <!-- //Existen vaias formas de hacer referencia a una direccion en  Flask  -->
                        <a href="{{ url_for('contacts.update', id=contact.id) }}" class="btn btn-dark btn-sm rounded-0">Update</a>
                        <a href="/delete/{{contact.id}}" class="btn btn-danger btn-sm rounded-0">Delete</a>
                    </div>
                </div>
                <p> {{ contact.email }} </p>
                <p> {{ contact.phone }} </p>
            </div>
        </div>

        {% endfor %}
        
        
    </div>


</div>


{% endblock %}
