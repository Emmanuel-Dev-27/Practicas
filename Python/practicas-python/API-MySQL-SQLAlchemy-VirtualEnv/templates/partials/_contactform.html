<form action="/new" method="POST" class="card bg-dark text-light rounded-3">
    <div class="card-body p-4">
            
        <div class="mb-3">
            <label for="fullname">Write your fullname:</label>
            <input type="text" name="fullname" placeholder="Write your fullname" class="form-control rounded-3 bg-dark border-1 border-light text-white">
        </div>

        <div class="mb-3">
            <label for="fullname">Write your email:</label>
            <input type="text" name="email" placeholder="Write your email" class="form-control rounded-3 bg-dark border-1 border-light text-white">
        </div>

        <div class="mb-3">
            <label for="fullname">Write your phone:</label>
            <input type="text" name="phone" placeholder="Write your phone" class="form-control rounded-3 bg-dark border-1 border-light text-white">
        </div>

        <button type="submit" class="btn btn-primary">Save</button>

    </div>
</form>
