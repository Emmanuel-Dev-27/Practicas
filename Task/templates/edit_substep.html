{% extends 'layout.html' %}
{% block body %}

<form action="/edit_substep/{{ group_id }}/{{ step_id }}/{{ substep.id }}" method="POST" class="card bg-dark text-light rounded-3">
    <div class="card-body p-4">

        <div class="mb-3">
            <label for="fullname">Write</label>
            <input type="text" name="name" placeholder="Name" value="{{ substep.name }}" class="form-control rounded-3 bg-dark border-1 border-light text-white">
        </div>

        <button type="submit" class="btn btn-primary">Save</button>

    </div>
</form>

{% endblock %}
